name: Lint & Code Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend
      - name: Run Linter
        run: npm run lint
        working-directory: ./backend

  frontend-lint:
    name: Frontend Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install Dependencies
        run: npm install
        working-directory: ./frontend
      - name: Run Type-check
        run: npx tsc -b
        working-directory: ./frontend
      - name: Run Linter
        run: npm run lint
        working-directory: ./frontend
