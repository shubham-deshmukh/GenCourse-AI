version: '3.3'

services:
  mongodb:
    image: mongo:latest
    container_name: gencourse-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - gencourse-network

  gencourse-backend:
    # For production deployment via CI/CD, use the pre-built image:
    image: ghcr.io/shubham-deshmukh/gencourse-backend:latest
    # To build locally instead, uncomment the lines below:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     NODE_ENV: development
    restart: always
    container_name: gencourse-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - NODE_ENV=${NODE_ENV:-development}
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/gencourse_ai?authSource=admin
      # External dependencies loaded from host .env file
      - LLM_WORKERS_CONFIG=${LLM_WORKERS_CONFIG}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL}
    depends_on:
      - mongodb
    networks:
      - gencourse-network
      # Note: The 'proxy' network is for production behind a global reverse proxy (Caddy).
      # For local development, you can comment this line out.
      - proxy

volumes:
  mongo-data:

networks:
  gencourse-network:
    driver: bridge
  # Note: The 'proxy' network is for production deployment.
  # For local development, you can comment this out unless you run `docker network create proxy` first.
  proxy:
    external: true