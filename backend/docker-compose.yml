version: '3.3'

services:
  mongodb:
    image: mongo:latest
    container_name: gencourse-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - gencourse-network

  gencourse-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    restart: always
    container_name: gencourse-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - NODE_ENV=${NODE_ENV:-development}
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/gencourse_ai?authSource=admin
      # External dependencies loaded from host .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_ISSUER_BASE_URL=${AUTH0_ISSUER_BASE_URL}
      - CONCURRENT_GENERATION_LIMIT=${CONCURRENT_GENERATION_LIMIT}
      - OUTLINE_LLM_MODEL=${OUTLINE_LLM_MODEL}
      - LESSON_LLM_MODEL=${LESSON_LLM_MODEL}
      - CHAT_LLM_MODEL=${CHAT_LLM_MODEL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    depends_on:
      - mongodb
    networks:
      - gencourse-network
      # Note: The 'proxy' network is for production behind a global reverse proxy (Caddy).
      # For local development, you can comment this line out.
      - proxy

volumes:
  mongo-data:

networks:
  gencourse-network:
    driver: bridge
  # Note: The 'proxy' network is for production deployment.
  # For local development, you can comment this out unless you run `docker network create proxy` first.
  proxy:
    external: true