<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Heavy blur filter for the background glowing aura -->
    <filter id="aura-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>
  
  <!-- Glowing Aura Background -->
  <g filter="url(#aura-blur)" opacity="0.65">
    <!-- Purple Glow (Left side of the aura) -->
    <circle cx="190" cy="256" r="100" fill="#7c3aed" />
    <!-- Cyan Glow (Right side of the aura) -->
    <circle cx="322" cy="256" r="100" fill="#06b6d4" />
  </g>

  <!-- Black Squircle Container -->
  <rect x="116" y="116" width="280" height="280" rx="70" fill="#000000" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />

  <!-- Glowing Cyan Sparkles Icon -->
  <g transform="translate(166, 166) scale(7.5)" stroke="#06b6d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main Sparkle -->
    <path d="m12 3-1.912 5.813a2 2 0 0 0-1.275 1.275L3 12l5.813 1.912a2 2 0 0 0 1.275 1.275L12 21l1.912-5.813a2 2 0 0 0 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 0-1.275-1.275Z" />
    <!-- Plus Sign (Top Right) -->
    <path d="M19 5v4M17 7h4" />
    <!-- Circle (Bottom Left - Filled) -->
    <circle cx="5" cy="18" r="1.2" fill="#06b6d4" />
  </g>
</svg>